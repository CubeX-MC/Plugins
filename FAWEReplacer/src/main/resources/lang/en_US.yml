  starting_fresh: "<reset><green>Starting cleaning task (fresh start)..."
  resume_found: "<reset><yellow>Found saved progress, will resume from <progress>."
  resume_use_fresh: "<reset><gray>Use <reset><yellow>/fawereplace start --fresh <reset><gray>to ignore progress and restart."
