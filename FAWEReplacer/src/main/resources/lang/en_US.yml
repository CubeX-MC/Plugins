console_only: "<reset><red>This command can only be executed from the console."
player_only: "<reset><red>This command can only be executed by a player."

# Command Help
help:
  header: "<reset><gray><strikethrough>                                                    "
  title: "<reset><gold><bold>FAWE Replace <reset><gray>- Command Help"
  footer: "<reset><gray><strikethrough>                                                    "
  start: "<reset><yellow>/<label> start <reset><gray>- Start cleaning task"
  start_desc: "  <reset><dark_gray>→ <reset><gray>Will automatically resume if previous progress exists"
  start_fresh: "<reset><yellow>/<label> start --fresh <reset><gray>- Force restart"
  start_fresh_desc: "  <reset><dark_gray>→ <reset><gray>Ignore previous progress and start from scratch"
  stop: "<reset><yellow>/<label> stop <reset><gray>- Stop current task"
  stop_desc: "  <reset><dark_gray>→ <reset><gray>Will save current progress (if resume is enabled)"
  status: "<reset><yellow>/<label> status <reset><gray>- Check task status"
  reload: "<reset><yellow>/<label> reload <reset><gray>- Reload configuration"
  help: "<reset><yellow>/<label> help <reset><gray>- Show this help"
  aliases: "<reset><gray>Aliases: <reset><yellow>/fawerl, /frl"
  setregion: "<reset><yellow>/<label> setregion <reset><gray>- Set cleaning region from selection"
  addrule: "<reset><yellow>/<label> addrule \\<origin> \\<target> <reset><gray>- Add replacement rule"
  removerule: "<reset><yellow>/<label> removerule \\<origin> <reset><gray>- Remove replacement rule"
  rules: "<reset><yellow>/<label> rules <reset><gray>- List current rules"

  # Command Registration
  description: "FAWE-based world cleaning and block replacement"
  usage: "/\\<command> \\<start|stop|status|reload|help>"

