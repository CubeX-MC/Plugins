  already_running: "<reset><yellow>清理任务已在进行中。使用 /fawereplace status 查看进度。"
  starting: "<reset><green>正在启动清理任务..."
  starting_fresh: "<reset><green>正在启动清理任务 (全新开始)..."
  resume_found: "<reset><yellow>发现保存的进度，将从 <progress> 继续。"
  resume_use_fresh: "<reset><gray>使用 <reset><yellow>/fawereplace start --fresh <reset><gray>可忽略进度重新开始。"
  started: "<reset><green>清理任务已启动！"
  task_info: "<reset><gray>任务信息："
  world: "<reset><gray>  世界: <reset><yellow><world>"
  region: "<reset><gray>  区域: <reset><yellow>(<x1>, <y1>, <z1>) <reset><gray>至 <reset><yellow>(<x2>, <y2>, <z2>)"
  parallel: "<reset><gray>  并行度: <reset><yellow><parallel> <reset><gray>线程"
  mode: "<reset><gray>  模式: <reset><yellow><mode>"
  resume_enabled: "<reset><gray>  断点续传: <reset><green>已启用 <reset><gray>(每 <interval> 个分块保存)"
