unknown_command: "<reset><red>未知的子命令。使用 <reset><yellow>/<label> help <reset><red>查看帮助。"
console_only: "<reset><red>此命令只能在控制台执行。"
player_only: "<reset><red>此命令只能由玩家执行。"

# 命令帮助
help:
  header: "<reset><gray><strikethrough>                                                    "
  title: "<reset><gold><bold>FAWE Replace <reset><gray>- 命令帮助"
  footer: "<reset><gray><strikethrough>                                                    "
  start: "<reset><yellow>/<label> start <reset><gray>- 开始清理任务"
  start_desc: "  <reset><dark_gray>→ <reset><gray>如果有之前的进度，将自动继续"
  start_fresh: "<reset><yellow>/<label> start --fresh <reset><gray>- 强制重新开始"
  start_fresh_desc: "  <reset><dark_gray>→ <reset><gray>忽略之前的进度，从头开始"
  stop: "<reset><yellow>/<label> stop <reset><gray>- 停止当前任务"
  stop_desc: "  <reset><dark_gray>→ <reset><gray>会保存当前进度（如果启用了断点续传）"
  status: "<reset><yellow>/<label> status <reset><gray>- 查看任务状态"
  reload: "<reset><yellow>/<label> reload <reset><gray>- 重载配置文件"
  help: "<reset><yellow>/<label> help <reset><gray>- 显示此帮助"
  aliases: "<reset><gray>别名: <reset><yellow>/fawerl, /frl"
  setregion: "<reset><yellow>/<label> setregion <reset><gray>- 设置清理区域为选区"
  addrule: "<reset><yellow>/<label> addrule \\<原方块> \\<目标方块> <reset><gray>- 添加替换规则"
  removerule: "<reset><yellow>/<label> removerule \\<原方块> <reset><gray>- 移除替换规则"
  rules: "<reset><yellow>/<label> rules <reset><gray>- 列出当前替换规则"
  
  # 注册命令描述
  description: "基于 FAWE 的世界清理与方块替换"
  usage: "/\\<command> \\<start|stop|status|reload|help>"

# 命令用法
usage: "<reset><yellow>用法: /<label> \\<start|stop|status|reload|help>"

# Start 命令
