types:
  service: "委托"
  wager: "对赌"
  partnership: "合作"
  alliance: "联盟"
  bounty: "悬赏"
  sale: "交易"
  loan: "借贷"

roles:
  owner: "雇主"
  contractor: "接单者"
  partner: "合作方"
  ally: "盟友"
  party_a: "甲方"
  party_b: "乙方"
  poster: "发布者"
