lang-version: 2
prefix: "<dark_gray>[<aqua>BookLite<dark_gray>] <reset>"

commands:
  header: "<aqua><bold>===== BookLite 命令 ====="
  help_convert: "<yellow>/booklite convert <gray>- 将手中原版成书转换为空壳书"
  help_restore: "<yellow>/booklite restore <gray>- 将手中 BookLite 空壳书还原为原版书"
  help_status: "<yellow>/booklite status <gray>- 查看数据库与缓存状态"
  help_list: "<yellow>/booklite list [页码] <gray>- 列出数据库书籍"
  help_info: "<yellow>/booklite info \\<id> <gray>- 查看单本书详情（支持短 ID）"
  help_read: "<yellow>/booklite read \\<id> <gray>- 管理员打开数据库中的书"
  help_get: "<yellow>/booklite get \\<id> <gray>- 获取绑定该 ID 的 BookLite 空壳书"
  help_delete: "<yellow>/booklite delete \\<id> <gray>- 永久删除一本书（不可恢复）"
  help_purge: "<yellow>/booklite purge \\<未访问天数> confirm <gray>- 永久清理超过 N 天无人右键阅读的书"
  help_restorecontainer: "<yellow>/booklite restorecontainer <gray>- 恢复视线目标容器里的空壳书"
  help_reload: "<yellow>/booklite reload <gray>- 重新加载配置与语言"
  unknown: "<prefix><red>未知子命令：<white><input>"
  ambiguous_id: "<prefix><red>短 ID 不唯一，请提供更精确的 ID。"
  player_only: "<prefix><red>该命令只能由玩家执行。"
  no_permission: "<prefix><red>你没有权限执行该操作。"
  reload_done: "<prefix><green>配置与语言已重新加载。"

book:
  converted: "<prefix><green>已转换为 BookLite 书籍：<white><title> <gray>(#<short_id>)"
  signed_converted: "<prefix><green>签名书已由 BookLite 接管：<white><title> <gray>(#<short_id>)"
  restored: "<prefix><green>已还原为原版书：<white><title> <gray>(#<short_id>)"
  fail_hold_vanilla: "<prefix><red>请在主手拿着一本未转换的原版成书。"
  fail_hold_booklite: "<prefix><red>请在主手拿着一本 BookLite 空壳书。"
  fail_missing: "<prefix><red>书籍数据缺失，请联系管理员。"
  fail_storage: "<prefix><red>数据库操作失败，请查看后台日志。"
  fail_too_many_pages: "<prefix><red>书页过多：<yellow><actual><red> / 上限 <yellow><max><red>。"
  fail_page_too_large: "<prefix><red>单页内容过大：<yellow><actual><red> bytes / 上限 <yellow><max><red>。"
  fail_book_too_large: "<prefix><red>整本书内容过大：<yellow><actual><red> bytes / 上限 <yellow><max><red>。"
  missing_title: "BookLite 缺失"
  missing_page: "这本书的数据缺失，请联系管理员。"

status:
  line: "<prefix><gray>书籍: <white><total> <gray>| 缓存: <white><cache> <gray>| 最近访问: <white><last_accessed> <gray>| 卸载模式: <white><uninstall>"

admin:
  read_opened: "<prefix><gray>已打开书籍 <white><title> <gray>(#<short_id>)。"
  get_done: "<prefix><green>已获取 BookLite 空壳书：<white><title> <gray>(#<short_id>)。"
  get_dropped: "<prefix><yellow>背包已满，BookLite 空壳书已掉落在你身边：<white><title> <gray>(#<short_id>)。"
  deleted: "<prefix><green>书籍已永久删除。"
  delete_no_change: "<prefix><gray>没有匹配到可删除的书籍，可能 ID 不存在。"
  purge_usage: "<prefix><red>用法：<yellow>/booklite purge \\<未访问天数> confirm<red>。从未读过的按创建时间算；填 0 会清理所有书籍。"
  purged: "<prefix><green>已永久清理 <white><count> <green>本超过 <white><days> <green>天无人右键阅读的书籍。"
  list_empty: "<prefix><gray>没有可显示的书籍。"
  list_header: "<prefix><gray>数据库书籍列表，第 <white><page> <gray>页："
  list_line: "<dark_gray>- <white>#<short_id> <gray>| <white><title> <gray>| 作者 <white><author> <gray>| 页数 <white><pages> <gray>| 最近访问 <white><last_accessed> <gray>| <dark_gray><created>"
  info_header: "<prefix><aqua>书籍详情 <gray>#<short_id>"
  info_title: "<gray>标题: <white><title>"
  info_author: "<gray>作者: <white><author>"
  info_pages: "<gray>页数: <white><pages>"
  info_hash: "<gray>内容哈希: <dark_gray><hash>"
  info_times: "<gray>创建: <white><created> <gray>| 更新: <white><updated> <gray>| 最近访问: <white><last_accessed>"
  restorecontainer_no_target: "<prefix><red>请看向 6 格内的容器方块后再执行该命令。"
  restorecontainer_done: "<prefix><green>已恢复目标容器中的 <white><count> <green>本 BookLite 书。"
