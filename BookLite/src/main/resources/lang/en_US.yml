prefix: "&8[&bBookLite&8] &r"

commands:
  header: "&b&l===== BookLite Commands ====="
  help_convert: "&e/booklite convert &7- Convert the held vanilla written book to a lightweight shell"
  help_restore: "&e/booklite restore &7- Restore the held BookLite shell to a vanilla book"
  help_status: "&e/booklite status &7- Show database and cache status"
  help_list: "&e/booklite list [page] &7- List stored books"
  help_info: "&e/booklite info <id> &7- Show one book's metadata (short id works)"
  help_read: "&e/booklite read <id> &7- Open a stored book as admin"
  help_get: "&e/booklite get <id> &7- Get a BookLite shell bound to this id"
  help_delete: "&e/booklite delete <id> &7- Permanently delete a stored book (no undo)"
  help_purge: "&e/booklite purge <days> confirm &7- Permanently delete books no player has read for N days"
  help_restorecontainer: "&e/booklite restorecontainer &7- Restore shells in the container you are looking at"
  help_reload: "&e/booklite reload &7- Reload config and language"
  unknown: "{prefix}&cUnknown subcommand: &f%input%"
  ambiguous_id: "{prefix}&cAmbiguous short id. Provide a more specific id."
  player_only: "{prefix}&cPlayers only."
  no_permission: "{prefix}&cYou lack the permission."
  reload_done: "{prefix}&aConfig and language reloaded."

book:
  converted: "{prefix}&aConverted to BookLite: &f%title% &7(#%short_id%)"
  signed_converted: "{prefix}&aSigned book stored by BookLite: &f%title% &7(#%short_id%)"
  restored: "{prefix}&aRestored vanilla book: &f%title% &7(#%short_id%)"
  fail_hold_vanilla: "{prefix}&cHold an unconverted vanilla written book in your main hand."
  fail_hold_booklite: "{prefix}&cHold a BookLite shell in your main hand."
  fail_missing: "{prefix}&cBook data is missing. Contact an administrator."
  fail_storage: "{prefix}&cDatabase operation failed. Check server logs."
  fail_too_many_pages: "{prefix}&cToo many pages: &e%actual%&c / max &e%max%&c."
  fail_page_too_large: "{prefix}&cOne page is too large: &e%actual%&c bytes / max &e%max%&c."
  fail_book_too_large: "{prefix}&cBook is too large: &e%actual%&c bytes / max &e%max%&c."
  missing_title: "BookLite Missing"
  missing_page: "Book data is missing. Contact an administrator."

status:
  line: "{prefix}&7Books: &f%total% &7| Cache: &f%cache% &7| last access: &f%last_accessed% &7| uninstall mode: &f%uninstall%"

admin:
  read_opened: "{prefix}&7Opened &f%title% &7(#%short_id%)."
  get_done: "{prefix}&aAdded BookLite shell: &f%title% &7(#%short_id%)."
  get_dropped: "{prefix}&eInventory full. Dropped BookLite shell near you: &f%title% &7(#%short_id%)."
  deleted: "{prefix}&aBook permanently deleted."
  delete_no_change: "{prefix}&7No matching book to delete; the id may not exist."
  purge_usage: "{prefix}&cUsage: &e/booklite purge <days> confirm&c. Never-read books fall back to creation time; 0 purges everything."
  purged: "{prefix}&aPermanently purged &f%count% &abook(s) no player has read for at least &f%days% &aday(s)."
  list_empty: "{prefix}&7No books to show."
  list_header: "{prefix}&7Stored books, page &f%page%&7:"
  list_line: "&8- &f#%short_id% &7| &f%title% &7| by &f%author% &7| pages &f%pages% &7| last &f%last_accessed% &7| &8%created%"
  info_header: "{prefix}&bBook info &7#%short_id%"
  info_title: "&7Title: &f%title%"
  info_author: "&7Author: &f%author%"
  info_pages: "&7Pages: &f%pages%"
  info_hash: "&7Content hash: &8%hash%"
  info_times: "&7Created: &f%created% &7| updated: &f%updated% &7| last access: &f%last_accessed%"
  restorecontainer_no_target: "{prefix}&cLook at a container block within 6 blocks, then run this command."
  restorecontainer_done: "{prefix}&aRestored &f%count% &aBookLite book(s) in the target container."
