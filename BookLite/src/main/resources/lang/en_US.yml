lang-version: 2
prefix: "<dark_gray>[<aqua>BookLite<dark_gray>] <reset>"

commands:
  header: "<aqua><bold>===== BookLite Commands ====="
  help_convert: "<yellow>/booklite convert <gray>- Convert the held vanilla written book to a lightweight shell"
  help_restore: "<yellow>/booklite restore <gray>- Restore the held BookLite shell to a vanilla book"
  help_status: "<yellow>/booklite status <gray>- Show database and cache status"
  help_list: "<yellow>/booklite list [page] <gray>- List stored books"
  help_info: "<yellow>/booklite info \\<id> <gray>- Show one book's metadata (short id works)"
  help_read: "<yellow>/booklite read \\<id> <gray>- Open a stored book as admin"
  help_get: "<yellow>/booklite get \\<id> <gray>- Get a BookLite shell bound to this id"
  help_delete: "<yellow>/booklite delete \\<id> <gray>- Permanently delete a stored book (no undo)"
  help_purge: "<yellow>/booklite purge \\<days> confirm <gray>- Permanently delete books no player has read for N days"
  help_restorecontainer: "<yellow>/booklite restorecontainer <gray>- Restore shells in the container you are looking at"
  help_reload: "<yellow>/booklite reload <gray>- Reload config and language"
  unknown: "<prefix><red>Unknown subcommand: <white><input>"
  ambiguous_id: "<prefix><red>Ambiguous short id. Provide a more specific id."
  player_only: "<prefix><red>Players only."
  no_permission: "<prefix><red>You lack the permission."
  reload_done: "<prefix><green>Config and language reloaded."

book:
  converted: "<prefix><green>Converted to BookLite: <white><title> <gray>(#<short_id>)"
  signed_converted: "<prefix><green>Signed book stored by BookLite: <white><title> <gray>(#<short_id>)"
  restored: "<prefix><green>Restored vanilla book: <white><title> <gray>(#<short_id>)"
  fail_hold_vanilla: "<prefix><red>Hold an unconverted vanilla written book in your main hand."
  fail_hold_booklite: "<prefix><red>Hold a BookLite shell in your main hand."
  fail_missing: "<prefix><red>Book data is missing. Contact an administrator."
  fail_storage: "<prefix><red>Database operation failed. Check server logs."
  fail_too_many_pages: "<prefix><red>Too many pages: <yellow><actual><red> / max <yellow><max><red>."
  fail_page_too_large: "<prefix><red>One page is too large: <yellow><actual><red> bytes / max <yellow><max><red>."
  fail_book_too_large: "<prefix><red>Book is too large: <yellow><actual><red> bytes / max <yellow><max><red>."
  missing_title: "BookLite Missing"
  missing_page: "Book data is missing. Contact an administrator."

status:
  line: "<prefix><gray>Books: <white><total> <gray>| Cache: <white><cache> <gray>| last access: <white><last_accessed> <gray>| uninstall mode: <white><uninstall>"

admin:
  read_opened: "<prefix><gray>Opened <white><title> <gray>(#<short_id>)."
  get_done: "<prefix><green>Added BookLite shell: <white><title> <gray>(#<short_id>)."
  get_dropped: "<prefix><yellow>Inventory full. Dropped BookLite shell near you: <white><title> <gray>(#<short_id>)."
  deleted: "<prefix><green>Book permanently deleted."
  delete_no_change: "<prefix><gray>No matching book to delete; the id may not exist."
  purge_usage: "<prefix><red>Usage: <yellow>/booklite purge \\<days> confirm<red>. Never-read books fall back to creation time; 0 purges everything."
  purged: "<prefix><green>Permanently purged <white><count> <green>book(s) no player has read for at least <white><days> <green>day(s)."
  list_empty: "<prefix><gray>No books to show."
  list_header: "<prefix><gray>Stored books, page <white><page><gray>:"
  list_line: "<dark_gray>- <white>#<short_id> <gray>| <white><title> <gray>| by <white><author> <gray>| pages <white><pages> <gray>| last <white><last_accessed> <gray>| <dark_gray><created>"
  info_header: "<prefix><aqua>Book info <gray>#<short_id>"
  info_title: "<gray>Title: <white><title>"
  info_author: "<gray>Author: <white><author>"
  info_pages: "<gray>Pages: <white><pages>"
  info_hash: "<gray>Content hash: <dark_gray><hash>"
  info_times: "<gray>Created: <white><created> <gray>| updated: <white><updated> <gray>| last access: <white><last_accessed>"
  restorecontainer_no_target: "<prefix><red>Look at a container block within 6 blocks, then run this command."
  restorecontainer_done: "<prefix><green>Restored <white><count> <green>BookLite book(s) in the target container."
