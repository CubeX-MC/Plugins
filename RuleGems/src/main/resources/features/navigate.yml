# ==========================================
# 指南针导航功能配置 (Navigate Feature)
# ==========================================
# 允许拥有 rulegems.navigate 权限的玩家
# 使用指南针右键来探测最近宝石的方位
#
# 本文件只负责指南针导航本身。
# 其他核心玩法开关（兑换、祭坛、长按兑换等）仍在 config.yml 中配置。

# 是否启用此功能
enabled: true

# 最大探测范围（方块数）
# 设为 -1 表示无限制
max_range: 2000

# 使用冷却时间（秒）
# 设为 0 表示无冷却
cooldown: 600

# 指南针指向宝石的持续时间（秒）
# -1: 持续导航，不自动恢复
# 0: 只发送方向/距离消息，不改变指南针目标
# 正数: 限时指向，过期后恢复玩家原本的指南针目标
active_seconds: 10

# 是否在消息中显示距离
show_distance: true

# 距离显示精度
# exact: 显示精确数值（如 "156 格"）
# approximate: 显示大概范围（如 "很近/较近/较远/很远"）
distance_precision: approximate

# 大概范围阈值（仅 distance_precision 为 approximate 时生效）
distance_thresholds:
  very_close: 50    # 0-50: 很近
  close: 150        # 50-150: 较近
  far: 500          # 150-500: 较远
  # 500+: 很远
