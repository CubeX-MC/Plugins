config-version: 3
language: zh_CN

economy:
  min-reward: 100.0
  max-reward: 100000.0
  creation-fee: 20.0
  completion-commission-percent: 5.0
  # 公开合同被雇主取消时,是否退回创建费(默认不退,避免来回创建薅羊毛)
  refund-creation-fee-on-cancel: false

disputes:
  # 是否允许雇主主动发起争议
  allow-owner-dispute: true
  # 是否允许接单者主动发起争议
  allow-contractor-dispute: true

limits:
  max-open-contracts: 3
  max-active-accepted-contracts: 3
  max-title-length: 80
  max-description-length: 500
  # 合同有效期(天)
  min-deadline-days: 1
  max-deadline-days: 7

expiry:
  cleanup-interval-minutes: 10
  submitted-auto-approve-hours: 72

retention:
  # 已完成合同保留天数;设为 0 可关闭自动删除。
  completed-contract-days: 90
  # 已取消/接单超时关闭合同保留天数;申诉中合同永不自动删除。
  closed-contract-days: 30

storage:
  flush-interval-seconds: 30

display:
  page-size: 8
  currency-prefix: "$"
