name: Regions
version: ${project.version}
main: org.cubexmc.regions.RegionsPlugin
api-version: '1.21.11'
folia-supported: true
author: CubeX-MC
description: Region-powered venue framework for RuleGems rulers and server events.
softdepend: [Lands, RuleGems]

permissions:
  regions.use:
    default: true
    description: Use basic Regions commands.
  regions.admin:
    default: op
    description: RuleGems ruler access; Region ownership is still required.
    children:
      regions.region.create: true
      regions.region.edit: true
      regions.region.remove: true
      regions.region.enable: true
      regions.region.bind: true
      regions.template.apply: true
      regions.validate: true
      regions.region.publish: true
      regions.region.rollback: true
      regions.region.archive: true
  regions.superadmin:
    default: op
    description: Emergency global Regions administration and ownership bypass.
    children:
      regions.reload: true
      regions.inspect: true
      regions.cleanup: true
      regions.bypass.limit: true
      regions.bypass.flags: true
  regions.reload:
    default: op
    description: Reload Regions.
  regions.region.create:
    default: op
    description: Create Regions.
  regions.region.edit:
    default: op
    description: Edit Regions.
  regions.region.remove:
    default: op
    description: Remove Regions.
  regions.region.enable:
    default: op
    description: Enable or disable Regions.
  regions.region.bind:
    default: op
    description: Bind external region sources.
  regions.region.publish:
    default: op
    description: Publish or withdraw owned Region drafts.
  regions.region.rollback:
    default: op
    description: View and restore owned Region revisions.
  regions.region.archive:
    default: op
    description: Archive owned Regions.
  regions.template.apply:
    default: op
    description: Apply Region templates.
  regions.inspect:
    default: op
    description: Inspect player Region sessions.
  regions.cleanup:
    default: op
    description: Cleanup player Region state.
  regions.validate:
    default: op
    description: Validate Region configuration.
  regions.bypass.limit:
    default: op
    description: Bypass Region creation limits.
  regions.bypass.flags:
    default: op
    description: Bypass Region flags.
