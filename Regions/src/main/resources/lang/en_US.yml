lang-version: 1

prefix: "&#69DB7C[Regions] "
help: |
  &#69DB7C/regions gui &#CFD8DC- Open the Regions management GUI
  &#69DB7C/regions list &#CFD8DC- List regions
  &#69DB7C/regions create <id> <name> &#CFD8DC- Create a region
  &#69DB7C/regions bind <id> cuboid|lands ... &#CFD8DC- Bind a region source
  &#69DB7C/regions mode set <id> dual_pvp|union_war|run_race|boat_race|horse_race|hide_and_seek ... &#CFD8DC- Set gameplay mode
  &#69DB7C/regions game <id> ready/start/status/end &#CFD8DC- Ready, judge-start, inspect, or end a game
  &#69DB7C/regions flag set <id> <flag> <value> &#CFD8DC- Set a rule flag
  &#69DB7C/regions effect add <id> <effect> [args] &#CFD8DC- Add a scoped effect
  &#69DB7C/regions validate [id] &#CFD8DC- Validate configuration
  &#69DB7C/regions inspect <player> &#CFD8DC- Inspect player region state
  &#69DB7C/regions cleanup <player> &#CFD8DC- Cleanup player region state
  &#69DB7C/regions reload &#CFD8DC- Reload configuration
help-player: "&#CFD8DCEnter a configured land or venue to experience Regions. Combat, race, and minigame venues will prompt you to use &#69DB7C/regions game <region> ready &#CFD8DCwhen confirmation is needed."
