lang-version: 1

prefix: "&#69DB7C[Regions] "
help: |
  &#69DB7C/regions gui &#CFD8DC- 打开 Regions 管理界面
  &#69DB7C/regions list &#CFD8DC- 查看区域
  &#69DB7C/regions create <id> <名称> &#CFD8DC- 创建区域
  &#69DB7C/regions bind <id> cuboid|lands ... &#CFD8DC- 绑定区域来源
  &#69DB7C/regions mode set <id> dual_pvp|union_war|run_race|boat_race|horse_race|hide_and_seek ... &#CFD8DC- 设置玩法
  &#69DB7C/regions game <id> ready/start/status/end &#CFD8DC- 确认、裁判开始、查看或结束游戏
  &#69DB7C/regions flag set <id> <flag> <值> &#CFD8DC- 设置规则
  &#69DB7C/regions effect add <id> <effect> [参数] &#CFD8DC- 添加区域效果
  &#69DB7C/regions validate [id] &#CFD8DC- 校验配置
  &#69DB7C/regions inspect <玩家> &#CFD8DC- 查看玩家区域状态
  &#69DB7C/regions cleanup <玩家> &#CFD8DC- 清理玩家区域状态
  &#69DB7C/regions reload &#CFD8DC- 重载配置
help-player: "&#CFD8DC进入被设置过的领地或场地即可体验 Regions；对战、比赛、小游戏场地会在需要确认时提示你使用 &#69DB7C/regions game <场地> ready&#CFD8DC。"
