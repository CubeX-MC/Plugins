name: Release Plugin

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: write

jobs:
  release:
    name: Release tagged plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve plugin from tag
        id: resolve
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          prefix="${tag%%-v*}"
          key="$(printf '%s' "$prefix" | tr '[:upper:]' '[:lower:]')"

          case "$key" in
            booklite)
              project="BookLite"
              ;;
            fawereplacer|fawe-replacer|fawereplace)
              project="FAWEReplacer"
              ;;
            mountlicense|mount-license)
              project="MountLicense"
              ;;
            contracts|contract)
              project="Contracts"
              ;;
            ecobalancer|eco-balancer)
              project="EcoBalancer"
              ;;
            rulegems|rule-gems)
              project="RuleGems"
              ;;
            metro)
              project="Metro"
              ;;
            railway)
              project="Railway"
              ;;
            *)
              echo "Unsupported release tag prefix: $prefix" >&2
              exit 1
              ;;
          esac

          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Build tagged plugin
        run: ./gradlew :${{ steps.resolve.outputs.project }}:build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          PROJECT_NAME: ${{ steps.resolve.outputs.project }}
        shell: bash
        run: |
          mapfile -t jars < <(find "$PROJECT_NAME/build/libs" -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | sort)
          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jar found for $PROJECT_NAME" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${jars[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${jars[@]}" \
              --title "$TAG_NAME" \
              --notes "Automated release for $PROJECT_NAME."
          fi
