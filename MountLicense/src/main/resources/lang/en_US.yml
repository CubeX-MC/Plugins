lang-version: 2
prefix: "<dark_gray>[<gold>ML<dark_gray>] <reset>"

license_item:
  display: "<gold>Vehicle License"
  hint_actionbar: "<yellow>Vehicle License: <white>Sneak-right-click a mount or vehicle to register."
  lore:
    - "<gray>Sneak-right-click your mount or vehicle"
    - "<gray>to register it as a private transport asset."
    - ""
    - "<dark_gray>Supports: horse / donkey / mule / pig / strider / camel / happy ghast / nautilus / boat / minecart and more"

key_item:
  display: "<yellow>Vehicle Key"
  lore:
    - "<gray>Right-click the sky -> recall nearest owned mount"
    - "<gray>Sneak-right-click your mount -> bind key to it"
    - "<gray>Command /ml key unbind -> remove binding"
  bound_display: "<yellow>Vehicle Key <gray>(#<short_id>)"
  bound_lore: "<dark_gray>Bound to: <gray>#<short_id>"

registration:
  success: "<prefix><green>Registered as <white><profile><green>. Plate: <gray><vehicle_id>"
  fail_no_profile: "<prefix><red>This entity type cannot be registered."
  fail_already_registered: "<prefix><red>This vehicle is already registered."
  fail_not_tamed: "<prefix><red>Tame it before registering."
  fail_not_owner: "<prefix><red>You are not the owner of this mount."
  fail_requires_saddle: "<prefix><red>This vehicle needs a saddle before it can be registered."
  fail_not_empty: "<prefix><red>Ask passengers to leave first."
  fail_no_license: "<prefix><red>Hold a Vehicle License in your main hand."
  fail_no_permission: "<prefix><red>You lack the permission to register vehicles."
  fail_cooldown: "<prefix><red>Too fast. Try again in <yellow><seconds>s<red>."
  fail_economy: "<prefix><red>Insufficient funds: need <yellow><amount><red>."
  fail_internal: "<prefix><red>Registration failed and the license was not consumed. If charged, an automatic refund was attempted; ask an admin to check the logs."
  fail_max_vehicles: "<prefix><red>You already own <yellow><current><red> vehicle(s); cap is <yellow><max><red>. Release one with /ml release first."
  charged: "<prefix><gray>Charged <yellow><amount> <gray>as registration fee."

commands:
  header: "<gold><bold>===== MountLicense Commands ====="
  help:
    line_list: "<yellow>/ml list <gray>- List your vehicles"
    line_info: "<yellow>/ml info \\<plate> <gray>- Show vehicle details"
    line_park: "<yellow>/ml park <gray>- Park: disable AI and mark parked (look at target)"
    line_unpark: "<yellow>/ml unpark <gray>- Cancel parked state"
    line_lock: "<yellow>/ml lock <gray>- Lock (mark state)"
    line_unlock: "<yellow>/ml unlock <gray>- Unlock"
    line_release: "<yellow>/ml release <gray>- Unregister (run twice within 30s to confirm)"
    line_recall: "<yellow>/ml recall [plate] <gray>- Recall vehicle (no plate = nearest)"
    line_locate: "<yellow>/ml locate \\<plate> <gray>- Show last known position"
    line_key_unbind: "<yellow>/ml key unbind <gray>- Clear binding on the key in main hand"
    line_trust: "<yellow>/ml trust \\<player> <gray>- Add player to the trust list of the vehicle you're looking at"
    line_untrust: "<yellow>/ml untrust \\<player> <gray>- Remove player from the vehicle's trust list"
    line_admin_inspect: "<yellow>/ml admin inspect <gray>- Inspect held item or targeted entity (admin)"
    line_admin_give: "<yellow>/ml admin give \\<player> license [n] <gray>- Give licenses (admin)"
    line_admin_reindex: "<yellow>/ml admin reindex <gray>- Rebuild index (admin)"
    line_admin_reload: "<yellow>/ml admin reload <gray>- Reload config (admin)"
  unknown_subcommand: "<prefix><red>Unknown subcommand: <white><input>"
  player_only: "<prefix><red>Players only."
  no_permission: "<prefix><red>You lack the permission."
  player_not_found: "<prefix><red>Player not found: <white><player>"

park:
  no_target: "<prefix><red>Look at a target vehicle."
  not_registered: "<prefix><red>This vehicle is not registered."
  not_owner: "<prefix><red>You are not the owner of this vehicle."
  already_in_target_state: "<prefix><gray>Vehicle already in the requested state."
  park_success: "<prefix><green>Parked <entity_type>, AI disabled."
  unpark_success: "<prefix><green>Restored <entity_type> to active."
  lock_success: "<prefix><green>Locked <entity_type>."
  unlock_success: "<prefix><green>Unlocked <entity_type>."
  release_confirm: "<prefix><yellow>Warning: run /ml release again within 30s to release this <entity_type>."
  release_done: "<prefix><gray>Released <entity_type>; PDC and index cleared."

protection:
  mount_blocked: "<prefix><red>This <entity_type> belongs to <white><owner><red>."
  damage_blocked: "<prefix><red>This <entity_type> is protected."
  destroy_blocked: "<prefix><red>This <entity_type> is protected from destruction."
  inventory_blocked: "<prefix><red>This <entity_type>'s cargo belongs to <white><owner><red>."
  leash_blocked: "<prefix><red>This <entity_type> is registered; leashing is blocked."

key:
  target_not_registered: "<prefix><red>Target entity is not registered."
  target_not_owner: "<prefix><red>You are not the owner; cannot bind."
  bound: "<prefix><green>Key bound to <entity_type> <gray>(#<short_id>)<green>."
  unbind_no_key: "<prefix><red>Hold a Vehicle Key in your main hand first."
  unbind_success: "<prefix><green>Key unbound."
  unbind_already_unbound: "<prefix><gray>That key has no binding."

recall:
  success: "<prefix><green>Vehicle recalled."
  fail_not_found: "<prefix><red>No vehicle with that plate."
  fail_not_owner: "<prefix><red>You are not the owner."
  fail_not_loaded: "<prefix><gray>Vehicle is not in a loaded chunk; cannot recall."
  fail_not_loaded_with_pos: "<prefix><gray>Vehicle is not loaded. Last seen: <white><world> <x>, <y>, <z>"
  fail_no_nearby: "<prefix><red>No recallable owned vehicle within <radius> blocks. Bind a key or move closer."
  fail_profile_no_summon: "<prefix><red>This vehicle profile does not support recall (e.g. minecart)."
  fail_unsafe: "<prefix><red>Destination is unsafe. Stand on a solid block with air above."
  fail_cooldown: "<prefix><red>Recall on cooldown: <yellow><seconds>s<red>."
  fail_no_permission: "<prefix><red>You lack the recall permission."

locate:
  loaded: "<prefix><green><profile> <gray>#<short_id><green> is loaded: <white><world> <x>, <y>, <z>"
  unloaded: "<prefix><gray><profile> <white>#<short_id><gray> is unloaded. Last seen: <white><world> <x>, <y>, <z>"

trust:
  no_target: "<prefix><red>Look at the vehicle you want to modify."
  target_not_registered: "<prefix><red>This vehicle is not registered."
  not_owner: "<prefix><red>You are not the owner of this vehicle."
  cannot_trust_self: "<prefix><red>You are already the owner."
  already_trusted: "<prefix><gray><player> is already on the trust list of #<short_id>."
  not_a_trustee: "<prefix><gray><player> is not on the trust list of #<short_id>."
  added: "<prefix><green>Added <white><player> <green>to the trust list of #<short_id> (<entity_type>)."
  removed: "<prefix><gray>Removed <white><player> <gray>from the trust list of #<short_id> (<entity_type>)."
  notify_added: "<prefix><green>You were added to the trust list of a <entity_type> (#<short_id>) — you can mount, open inventory, and leash it."
  notify_removed: "<prefix><gray>You were removed from the trust list of <entity_type> (#<short_id>)."
  fail_max: "<prefix><red>This vehicle's trust list is full (cap <max>)."

list:
  empty: "<prefix><gray>You have no registered vehicles."
  header: "<prefix><gray>Your vehicles (<white><count><gray>):"
  line: "<dark_gray> - <white><profile> <gray>| <white>Plate:<gray> <short_id> <gray>| state:<white> <state> <gray>| world:<white> <world>"

info:
  not_found: "<prefix><red>No vehicle with that plate."
  not_owner: "<prefix><red>That is not your vehicle."
  header: "<gold><bold>===== Vehicle Info ====="
  line_id: "<gray>Plate: <white><vehicle_id>"
  line_profile: "<gray>Profile: <white><profile>"
  line_entity: "<gray>Entity: <white><entity_type>"
  line_owner: "<gray>Owner: <white><owner>"
  line_state: "<gray>State: <white><state>"
  line_location: "<gray>Location: <white><world> <x>, <y>, <z>"
  line_last_seen: "<gray>Last seen: <white><last_seen>"
  line_trustees: "<gray>Trustees: <white><trustees>"
  trustees_none: "<dark_gray>none"

admin:
  inspect:
    no_target: "<prefix><red>No targeted entity or held registered item."
    target_unregistered: "<prefix><gray>Target is not registered. Type: <white><entity_type>"
    target_registered: "<prefix><green>Target is registered. Plate: <white><vehicle_id>"
  give:
    success: "<prefix><green>Gave <yellow><amount> <green>license(s) to <white><player><green>."
    received: "<prefix><green>You received <yellow><amount> <green>license(s)."
  reindex:
    started: "<prefix><gray>Scanning loaded entities and rebuilding index..."
    finished: "<prefix><green>Reindex done: scanned <white><scanned><green>, recovered <white><recovered><green>."
  reload:
    success: "<prefix><green>Configuration reloaded."

general:
  unknown_player: "<gray>unknown"
  never: "<gray>never"
