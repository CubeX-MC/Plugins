prefix: "&8[&6牌照&8] &r"

license_item:
  display: "&6载具牌照"
  hint_actionbar: "&e载具牌照：&f下蹲右键坐骑或载具即可注册"
  lore:
    - "&7蹲下右键你的坐骑或载具"
    - "&7将其注册为你的私有交通资产。"
    - ""
    - "&8支持：马 / 驴 / 骡 / 猪 / 炽足兽 / 骆驼 / 乐魂 / 鹦鹉螺 / 船 / 矿车等"

key_item:
