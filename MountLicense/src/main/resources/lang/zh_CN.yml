lang-version: 2
prefix: "<dark_gray>[<gold>牌照<dark_gray>] <reset>"

license_item:
  display: "<gold>载具牌照"
  hint_actionbar: "<yellow>载具牌照：<white>下蹲右键坐骑或载具即可注册"
  lore:
    - "<gray>蹲下右键你的坐骑或载具"
    - "<gray>将其注册为你的私有交通资产。"
    - ""
    - "<dark_gray>支持：马 / 驴 / 骡 / 猪 / 炽足兽 / 骆驼 / 乐魂 / 鹦鹉螺 / 船 / 矿车等"

key_item:
  display: "<yellow>载具钥匙"
  lore:
    - "<gray>右键朝向天空 → 召回最近的载具"
    - "<gray>蹲下右键你的载具 → 把这把钥匙绑定到它"
    - "<gray>命令 /ml key unbind → 解除绑定"
  bound_display: "<yellow>载具钥匙 <gray>(#<short_id>)"
  bound_lore: "<dark_gray>已绑定: <gray>#<short_id>"

registration:
  success: "<prefix><green>已注册为 <white><profile> <green>交通资产。牌照: <gray><vehicle_id>"
  fail_no_profile: "<prefix><red>这种实体无法注册为载具。"
  fail_already_registered: "<prefix><red>这件载具已经被注册过了。"
  fail_not_tamed: "<prefix><red>请先驯服它再注册。"
  fail_not_owner: "<prefix><red>你不是这只坐骑的主人。"
  fail_requires_saddle: "<prefix><red>这种载具需要先装上鞍才能注册。"
  fail_not_empty: "<prefix><red>请先让乘客离开。"
  fail_no_license: "<prefix><red>你的主手必须拿着一张载具牌照。"
  fail_no_permission: "<prefix><red>你没有注册载具的权限。"
  fail_cooldown: "<prefix><red>操作过快，请稍候 <yellow><seconds>s <red>再试。"
  fail_economy: "<prefix><red>金额不足：需要 <yellow><amount><red>。"
  fail_internal: "<prefix><red>注册失败，未消耗牌照；如已扣费，系统已尝试自动退款。请联系管理员查看日志。"
  fail_max_vehicles: "<prefix><red>你名下已注册 <yellow><current><red> 辆载具，达到上限 <yellow><max><red>。请先 /ml release 一辆。"
  charged: "<prefix><gray>已扣除 <yellow><amount> <gray>作为注册费。"

commands:
  header: "<gold><bold>===== MountLicense 命令 ====="
  help:
    line_list: "<yellow>/ml list <gray>- 查看你的载具"
    line_info: "<yellow>/ml info \\<牌照> <gray>- 查看载具详情"
    line_park: "<yellow>/ml park <gray>- 停车：关闭 AI 并标记停泊（看着目标）"
    line_unpark: "<yellow>/ml unpark <gray>- 取消停车"
    line_lock: "<yellow>/ml lock <gray>- 锁定（保留状态记号）"
    line_unlock: "<yellow>/ml unlock <gray>- 解锁"
    line_release: "<yellow>/ml release <gray>- 解除注册（30 秒内重复一次确认）"
    line_recall: "<yellow>/ml recall [牌照] <gray>- 召回载具（无牌照召回最近）"
    line_locate: "<yellow>/ml locate \\<牌照> <gray>- 查询载具最近坐标"
    line_key_unbind: "<yellow>/ml key unbind <gray>- 解除手中钥匙的绑定"
    line_trust: "<yellow>/ml trust \\<玩家> <gray>- 看着自己的载具，把该玩家加入信任列表"
    line_untrust: "<yellow>/ml untrust \\<玩家> <gray>- 从该载具的信任列表移除玩家"
    line_admin_inspect: "<yellow>/ml admin inspect <gray>- 检查手持物或视线实体 (管理)"
    line_admin_give: "<yellow>/ml admin give \\<player> license [n] <gray>- 发放牌照 (管理)"
    line_admin_reindex: "<yellow>/ml admin reindex <gray>- 重建索引 (管理)"
    line_admin_reload: "<yellow>/ml admin reload <gray>- 重新加载配置 (管理)"
  unknown_subcommand: "<prefix><red>未知子命令：<white><input>"
  player_only: "<prefix><red>该命令只能由玩家执行。"
  no_permission: "<prefix><red>你没有权限执行该命令。"
  player_not_found: "<prefix><red>找不到玩家：<white><player>"

park:
  no_target: "<prefix><red>请看向目标载具。"
  not_registered: "<prefix><red>该载具尚未注册。"
  not_owner: "<prefix><red>你不是这辆载具的主人。"
  already_in_target_state: "<prefix><gray>该载具已经处于目标状态。"
  park_success: "<prefix><green>已停泊 <entity_type>，AI 已关闭。"
  unpark_success: "<prefix><green>已恢复 <entity_type> 的活动状态。"
  lock_success: "<prefix><green>已锁定 <entity_type>。"
  unlock_success: "<prefix><green>已解锁 <entity_type>。"
  release_confirm: "<prefix><yellow>警告：再次执行 /ml release 将解除该 <entity_type> 的注册（30 秒内有效）。"
  release_done: "<prefix><gray>已解除 <entity_type> 的注册，所有 PDC 与索引已清除。"

protection:
  mount_blocked: "<prefix><red>该 <entity_type> 属于 <white><owner><red>，无法骑乘。"
  damage_blocked: "<prefix><red>该 <entity_type> 受保护，无法伤害。"
  destroy_blocked: "<prefix><red>该 <entity_type> 受保护，无法破坏。"
  inventory_blocked: "<prefix><red>该 <entity_type> 的容器属于 <white><owner><red>。"
  leash_blocked: "<prefix><red>该 <entity_type> 已被注册，禁止牵绳。"

key:
  target_not_registered: "<prefix><red>目标实体未注册。"
  target_not_owner: "<prefix><red>你不是这辆载具的主人，无法绑定。"
  bound: "<prefix><green>钥匙已绑定到 <entity_type> <gray>(#<short_id>)<green>。"
  unbind_no_key: "<prefix><red>请先在主手拿着一把载具钥匙。"
  unbind_success: "<prefix><green>已解除钥匙绑定。"
  unbind_already_unbound: "<prefix><gray>这把钥匙本来就没有绑定。"

recall:
  success: "<prefix><green>已召回载具。"
  fail_not_found: "<prefix><red>找不到该牌照对应的载具。"
  fail_not_owner: "<prefix><red>你不是这辆载具的主人。"
  fail_not_loaded: "<prefix><gray>该载具不在已加载区块内，无法召回。"
  fail_not_loaded_with_pos: "<prefix><gray>该载具不在已加载区块内。最近位置: <white><world> <x>, <y>, <z>"
  fail_no_nearby: "<prefix><red>附近 <radius> 格内没有你拥有的可召回载具。请先绑定钥匙或靠近你的载具。"
  fail_profile_no_summon: "<prefix><red>该载具不支持召回（如矿车）。"
  fail_unsafe: "<prefix><red>当前位置不安全，无法召回。请站在固体方块上、头顶开阔。"
  fail_cooldown: "<prefix><red>召回冷却中：<yellow><seconds>s<red>。"
  fail_no_permission: "<prefix><red>你没有使用钥匙的权限。"

locate:
  loaded: "<prefix><green><profile> <gray>#<short_id><green> 当前已加载：<white><world> <x>, <y>, <z>"
  unloaded: "<prefix><gray><profile> <white>#<short_id><gray> 当前未加载。最近位置：<white><world> <x>, <y>, <z>"

trust:
  no_target: "<prefix><red>请看向你要操作的载具。"
  target_not_registered: "<prefix><red>该载具尚未注册。"
  not_owner: "<prefix><red>你不是这辆载具的主人。"
  cannot_trust_self: "<prefix><red>你本来就是这辆载具的主人。"
  already_trusted: "<prefix><gray><player> 已经在 #<short_id> 的信任名单中。"
  not_a_trustee: "<prefix><gray><player> 不在 #<short_id> 的信任名单中。"
  added: "<prefix><green>已把 <white><player> <green>加入 #<short_id> (<entity_type>) 的信任名单。"
  removed: "<prefix><gray>已把 <white><player> <gray>从 #<short_id> (<entity_type>) 的信任名单移除。"
  notify_added: "<prefix><green>你被加入了一辆 <entity_type> (#<short_id>) 的信任名单，可以骑乘、开容器、牵绳。"
  notify_removed: "<prefix><gray>你已被移出 <entity_type> (#<short_id>) 的信任名单。"
  fail_max: "<prefix><red>该载具的信任名单已满 (上限 <max>)。"

list:
  empty: "<prefix><gray>你目前没有注册任何载具。"
  header: "<prefix><gray>你的载具 (<white><count><gray>):"
  line: "<dark_gray> - <white><profile> <gray>| <white>牌照:<gray> <short_id> <gray>| 状态:<white> <state> <gray>| 世界:<white> <world>"

info:
  not_found: "<prefix><red>找不到该牌照对应的载具。"
  not_owner: "<prefix><red>这不是你的载具。"
  header: "<gold><bold>===== 载具详情 ====="
  line_id: "<gray>牌照: <white><vehicle_id>"
  line_profile: "<gray>类型: <white><profile>"
  line_entity: "<gray>实体: <white><entity_type>"
  line_owner: "<gray>所有者: <white><owner>"
  line_state: "<gray>状态: <white><state>"
  line_location: "<gray>位置: <white><world> <x>, <y>, <z>"
  line_last_seen: "<gray>最近可见: <white><last_seen>"
  line_trustees: "<gray>信任名单: <white><trustees>"
  trustees_none: "<dark_gray>无"

admin:
  inspect:
    no_target: "<prefix><red>未检测到视线实体或手持注册物。"
    target_unregistered: "<prefix><gray>目标实体尚未注册。类型: <white><entity_type>"
    target_registered: "<prefix><green>目标已注册。牌照: <white><vehicle_id>"
  give:
    success: "<prefix><green>已向 <white><player> <green>发放 <yellow><amount> <green>张牌照。"
    received: "<prefix><green>你收到了 <yellow><amount> <green>张载具牌照。"
  reindex:
    started: "<prefix><gray>开始扫描已加载实体并重建索引……"
    finished: "<prefix><green>索引重建完成：扫描 <white><scanned><green>，恢复 <white><recovered><green>。"
  reload:
    success: "<prefix><green>配置已重新加载。"

general:
  unknown_player: "<gray>未知"
  never: "<gray>从未"
