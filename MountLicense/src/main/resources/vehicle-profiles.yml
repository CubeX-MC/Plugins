# MountLicense vehicle profiles
# Each profile maps a set of entity types to a feature set.
# When the player interacts with a license, the first profile whose
# entityTypes list contains the target's EntityType wins.
#
# Features (Phase 1 honored: register, protect-flag, station-flag.
# Other flags are reserved for later phases and stored on the index only.)
#
# Compatibility:
# The plugin compiles against Spigot API 1.18.2. Newer entity names in this
# file are skipped with a startup warning on older servers instead of breaking
# the whole profile load. Newer boat variants, CAMEL/CAMEL_HUSK,
# HAPPY_GHAST, NAUTILUS, and ZOMBIE_NAUTILUS only activate on server APIs
# that expose those EntityType names.

profiles:
  horse:
    entityTypes:
      - HORSE
      - DONKEY
      - MULE
      - SKELETON_HORSE
      - ZOMBIE_HORSE
    features:
      register: true
      protect: true
      summon: true
      park: true
      inventoryAccess: true
      station: true
    requiresTamedOwner: true
    requiresSaddle: false

  llama:
    entityTypes:
      - LLAMA
      - TRADER_LLAMA
    features:
      register: true
      protect: true
      summon: true
      park: true
      inventoryAccess: true
      station: true
    requiresTamedOwner: true
    requiresSaddle: false

  pig:
    entityTypes:
      - PIG
    features:
      register: true
      protect: true
      summon: true
      park: true
      inventoryAccess: false
      station: true
    requiresTamedOwner: false
    requiresSaddle: true

  strider:
