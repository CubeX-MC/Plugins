      - HAPPY_GHAST
    features:
      register: true
      protect: true
      summon: true
      park: true
      inventoryAccess: false
      station: true
    requiresTamedOwner: false
    requiresSaddle: false

  boat:
    entityTypes:
      - BOAT
      - CHEST_BOAT
      - OAK_BOAT
      - OAK_CHEST_BOAT
      - SPRUCE_BOAT
      - SPRUCE_CHEST_BOAT
      - BIRCH_BOAT
      - BIRCH_CHEST_BOAT
      - JUNGLE_BOAT
      - JUNGLE_CHEST_BOAT
      - ACACIA_BOAT
      - ACACIA_CHEST_BOAT
      - DARK_OAK_BOAT
      - DARK_OAK_CHEST_BOAT
      - MANGROVE_BOAT
      - MANGROVE_CHEST_BOAT
      - CHERRY_BOAT
      - CHERRY_CHEST_BOAT
      - BAMBOO_RAFT
      - BAMBOO_CHEST_RAFT
      - PALE_OAK_BOAT
      - PALE_OAK_CHEST_BOAT
    features:
      register: true
